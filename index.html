<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickCart | Digital Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">🛒 QuickCart</div>
        <nav>
            <a href="#" class="active">Home</a>
            <a href="#">Electronics</a>
            <a href="#">Sports</a>
            <a href="#">Cart</a>
        </nav>
        <div class="nav-search-container">
            <input type="text" placeholder="Search products...">
            <span id="cart-icon">🛒 <small id="cart-count">0</small></span>
        </div>
    </header>

    <main class="content-wrapper">
        <section class="header-row">
            <h1>All Products</h1>
            <div class="inner-search">
                <input type="text" id="mainSearch" placeholder="🔍 Search products...">
            </div>
        </section>

        <div class="product-grid" id="productContainer">
            <div class="card" data-name="product1">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300" alt="Headphones">
                <h3>Product1</h3>
                <p class="price">$49.99</p>
                <button class="add-btn">Add to Cart</button>
            </div>
            <div class="card" data-name="product2">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300" alt="Watch">
                <h3>Product2</h3>
                <p class="price">$79.99</p>
                <button class="add-btn">Add to Cart</button>
            </div>
            <div class="card" data-name="product3">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300" alt="Shoe">
                <h3>Product3</h3>
                <p class="price">$29.99</p>
                <button class="add-btn">Add to Cart</button>
            </div>
            <div class="card" data-name="product4">
                <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=300" alt="Camera">
                <h3>Product4</h3>
                <p class="price">$99.99</p>
                <button class="add-btn">Add to Cart</button>
            </div>
        </div>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
